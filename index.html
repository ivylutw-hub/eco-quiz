<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#24764b"><meta name="apple-mobile-web-app-capable" content="yes"><title>環保冒險王｜地球守護挑戰</title><link rel="stylesheet" href="style.css"></head><body><div class="app">
<section id="home"><div class="hero"><h1>🌍 環保冒險王</h1><p id="heroSubtitle">地球守護挑戰</p><div class="profilebar"><div class="avatar" id="avatar">🦊</div><div><div class="name" id="playerName">守護者</div><div class="ranktitle" id="rankTitle">見習環保員</div><div class="xpbar"><div class="xpfill" id="xpfill"></div></div></div><div class="level" id="level">Lv.1</div></div></div>
<div class="card"><div class="section-title"><h2>🎯 今日任務</h2><span class="pill" id="streak">🔥 連續 0 天</span></div><div class="daily"><div><h3 id="dailyTitle">答對 10 題，獲得今日寶箱</h3><div class="small">今天也一起幫地球恢復能量吧！</div><div class="taskbar"><div class="taskfill" id="taskfill"></div></div></div><div class="chest" id="chest">🎁</div></div><div class="actions"><button class="btn gold" id="dailyBtn">開始今日挑戰</button><button class="btn secondary" id="wrongBtn">怪獸弱點筆記</button></div></div>
<div class="card"><div class="section-title"><h2>🗺️ 冒險地圖</h2><span class="pill" id="worldProgress">0 / 7 關</span></div><div class="map" id="map"></div></div>
<div class="card"><div class="section-title"><h2>🏆 我的戰績</h2></div><div class="stats"><div class="stat"><b id="energy">0</b><small>地球能量</small></div><div class="stat"><b id="medalCount">0</b><small>徽章</small></div><div class="stat"><b id="correctTotal">0</b><small>累積答對</small></div><div class="stat"><b id="wrongCount">0</b><small>待重練</small></div></div><div class="actions"><button class="btn secondary" id="medalBtn">查看徽章</button><button class="btn secondary" id="switchProfile">切換守護者</button><button class="btn danger" id="resetBtn">重新開始</button></div></div></section>
<section id="quiz" class="card hidden"><div class="quiztop"><div class="progressbar"><div class="progressfill" id="progressfill"></div></div><div class="counter" id="counter"></div></div><div class="battle"><div class="monster" id="monster">👾</div><b id="bossName">環境怪獸</b><div class="hpbar"><div class="hpfill" id="hpfill"></div></div></div><span class="badge" id="stageBadge"></span><div class="question" id="question"></div><div class="options" id="options"></div><div class="feedback hidden" id="feedback"></div><div class="actions"><button class="btn secondary" id="quitBtn">先回基地</button><button class="btn primary hidden" id="nextBtn">下一題</button></div></section>
<section id="result" class="card result hidden"><div class="loot" id="loot">🌟</div><div class="rank" id="rank">S</div><h2 id="resultTitle"></h2><p id="resultText"></p><div class="actions"><button class="btn primary" id="againBtn">再挑戰一次</button><button class="btn secondary" id="homeBtn">回冒險地圖</button></div></section>
<section id="medalPage" class="card hidden"><div class="section-title"><h2>🏅 守護者徽章冊</h2><button class="btn secondary" id="medalBack">返回</button></div><div class="medals" id="medals"></div></section><div class="footer">每位守護者的紀錄只保存在自己的裝置與瀏覽器中</div></div>
<div class="modal hidden" id="profileModal"><div class="modalbox"><div class="modal-logo">🌍</div><h2>建立你的守護者</h2><p>輸入名字並選擇冒險夥伴，每個人的進度會分開保存。</p><label class="label">守護者名字</label><input class="nameinput" id="nameInput" maxlength="12" placeholder="例如：沄芯、小宇"><div class="label">選擇冒險夥伴</div><div class="avatars"><button class="avatar-choice selected" data-avatar="🦊">🦊<small>狐狸隊長</small></button><button class="avatar-choice" data-avatar="🐼">🐼<small>熊貓博士</small></button><button class="avatar-choice" data-avatar="🐧">🐧<small>企鵝探險家</small></button><button class="avatar-choice" data-avatar="🦉">🦉<small>貓頭鷹老師</small></button><button class="avatar-choice" data-avatar="🐢">🐢<small>海龜守護者</small></button></div><button class="btn primary" id="saveProfile">開始冒險</button><button class="btn secondary hidden" id="cancelProfile">取消</button></div></div><div class="toast" id="toast"></div><script src="questions.js"></script><script src="app.js"></script></body></html>
